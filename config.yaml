  brokerage_fee_pct: 0.05  # 5% on margin
  standard_lot_size: 100000
  default_micro_lots: 0.01 # 1000 units
  base_currency: "USD"

assets:
  pairs:
    - symbol: "EURUSD=X"
      name: "EUR/USD"
    - symbol: "JPY=X"
      name: "USD/JPY"
    - symbol: "GBPUSD=X"
      name: "GBP/USD"
    - symbol: "CHF=X"
      name: "USD/CHF"
    - symbol: "GC=F"
      name: "Gold/USD"

arena:
  initial_balance: 10000.0 # Starting fake money for each AI
